<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIBLIAPPS - Explorador de Arquivos</title>
    <!-- FontAwesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f5f5f7;
            --sidebar-color: #e8e8ed;
            --text-color: #1d1d1f;
            --accent-color: #0071e3;
            --hover-color: rgba(0, 113, 227, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 15px 25px;
            background: white;
            border-bottom: 1px solid #d2d2d7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            display: grid;
            grid-template-columns: 250px 1fr;
            flex-grow: 1;
            overflow: hidden;
        }

        /* Sidebar com Flexbox */
        aside {
            background-color: var(--sidebar-color);
            padding: 20px;
            border-right: 1px solid #d2d2d7;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover {
            background-color: var(--hover-color);
        }

        /* Main View com Grid */
        main {
            padding: 25px;
            overflow-y: auto;
            background: white;
        }

        .breadcrumbs {
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #6e6e73;
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
        }

        .file-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.1s, background 0.2s;
        }

        .file-card:hover {
            background-color: var(--hover-color);
            transform: translateY(-2px);
        }

        .file-card i {
            font-size: 3rem;
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        .file-name {
            font-size: 0.85em;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <header>
        <h1>BIBLIAPPS <small style="font-size: 0.5em; color: #888;">Explorer v1.0</small></h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar arquivos..." style="padding: 5px 10px; border-radius: 4px; border: 1px solid #ccc;">
        </div>
    </header>

    <div class="container">
        <aside>
            <div class="nav-item"><i class="fas fa-home"></i> Home</div>
            <div class="nav-item"><i class="fas fa-star"></i> Favoritos</div>
            <div class="nav-item"><i class="fas fa-clock"></i> Recentes</div>
            <div class="nav-item"><i class="fas fa-trash"></i> Lixeira</div>
        </aside>

        <main>
            <div class="breadcrumbs" id="breadcrumb">Home > Projetos</div>
            <div class="file-grid" id="fileGrid">
                <!-- Renderizado via JS -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
